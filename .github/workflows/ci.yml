name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    name: TypeScript · Lint · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --ignore-scripts

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint -- --max-warnings 35

      - name: Jest
        run: npm test -- --ci --coverage --coverageReporters=text-summary
